<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blazing Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Blazing Chess</h1>
  <div id="theme-selector">
    <button class="theme-btn active" data-theme="glass">Glass</button>
    <button class="theme-btn" data-theme="fire" disabled>Fire</button>
    <button class="theme-btn" data-theme="ice" disabled>Ice</button>
    <button class="theme-btn" data-theme="thunder" disabled>Thunder</button>
    <button class="theme-btn" data-theme="earth" disabled>Earth</button>
    <button class="theme-btn" data-theme="wind" disabled>Wind</button>
  </div>
  <div id="board"></div>
  <script src="script.js"></script>
</body>
</html>
