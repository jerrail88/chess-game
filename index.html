<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blazing Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-glass">
  <h1>Blazing Chess</h1>
  <div id="theme-selector">
    <button class="theme-btn active" data-theme="glass">Glass</button>
    <button class="theme-btn" data-theme="fire">Fire</button>
    <button class="theme-btn" data-theme="ice">Ice</button>
    <button class="theme-btn" data-theme="thunder">Thunder</button>
    <button class="theme-btn" data-theme="earth">Earth</button>
  </div>

  <div id="scoreboard">
    <div class="player-card" id="black-card">
      <div class="player-name">Black</div>
      <div class="captured-pieces" id="black-captures"></div>
      <div class="player-score">Points: <span id="black-score">0</span></div>
    </div>
    <div class="player-card" id="white-card">
      <div class="player-name">White</div>
      <div class="captured-pieces" id="white-captures"></div>
      <div class="player-score">Points: <span id="white-score">0</span></div>
    </div>
  </div>

  <div id="turn-indicator">White's turn</div>

  <div id="board"></div>
  <script src="script.js"></script>
</body>
</html>
